<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhishNet AI — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}"/>
</head>
<body>
<div class="auth-bg"><div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon">🛡️</div>
    <div class="logo-text">PHISHNET AI</div>
    <div class="logo-sub">PHISHING DETECTION SYSTEM</div>
  </div>
  <div class="auth-title">CREATE ACCOUNT</div>
  <div class="error-box" id="errorBox"></div>
  <div class="success-box" id="successBox"></div>
  <div class="form-group"><label class="form-label">USERNAME</label><input class="form-input" type="text" id="username" placeholder="Choose a username"/></div>
  <div class="form-group"><label class="form-label">EMAIL</label><input class="form-input" type="email" id="email" placeholder="your@email.com"/></div>
  <div class="form-group"><label class="form-label">PASSWORD</label><input class="form-input" type="password" id="password" placeholder="Min 6 characters"/></div>
  <button class="btn-primary" onclick="register()">🚀 CREATE ACCOUNT</button>
  <div class="auth-footer">Already have an account? <a href="/login" class="auth-link">Login here</a></div>
</div></div>
<script>
async function register() {
  const username=document.getElementById('username').value.trim();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const errorBox=document.getElementById('errorBox'); const successBox=document.getElementById('successBox');
  errorBox.style.display=successBox.style.display='none';
  if(!username||!email||!password){errorBox.textContent='Please fill in all fields.';errorBox.style.display='block';return;}
  if(password.length<6){errorBox.textContent='Password must be at least 6 characters.';errorBox.style.display='block';return;}
  const res=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
  const data=await res.json();
  if(res.ok){successBox.textContent='Account created! Redirecting...';successBox.style.display='block';setTimeout(()=>window.location.href='/dashboard',1200);}
  else{errorBox.textContent=data.error||'Registration failed.';errorBox.style.display='block';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter') register();});
</script>
</body></html>
