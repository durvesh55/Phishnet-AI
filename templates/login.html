<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhishNet AI — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}"/>
</head>
<body>
<div class="auth-bg"><div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon">🛡️</div>
    <div class="logo-text">PHISHNET AI</div>
    <div class="logo-sub">PHISHING DETECTION SYSTEM</div>
  </div>
  <div class="auth-title">ANALYST LOGIN</div>
  <div class="error-box" id="errorBox"></div>
  <div class="form-group"><label class="form-label">USERNAME</label><input class="form-input" type="text" id="username" placeholder="Enter username"/></div>
  <div class="form-group"><label class="form-label">PASSWORD</label><input class="form-input" type="password" id="password" placeholder="Enter password"/></div>
  <button class="btn-primary" onclick="login()">⚡ LOGIN</button>
  <div class="otp-box" id="otpBox">
    <div class="otp-hint" id="otpHint">🔐 OTP sent! In production this goes to your email. For demo, OTP is shown here.</div>
    <div class="form-group"><label class="form-label">ENTER OTP</label><input class="form-input" type="text" id="otpInput" placeholder="6-digit code" maxlength="6"/></div>
    <button class="btn-primary" onclick="verifyOtp()">✅ VERIFY OTP</button>
  </div>
  <div class="auth-footer">No account? <a href="/register" class="auth-link">Register here</a></div>
</div></div>
<script>
let pendingUserId = null;
async function login() {
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  const errorBox=document.getElementById('errorBox');
  errorBox.style.display='none';
  if(!username||!password){errorBox.textContent='Please fill in all fields.';errorBox.style.display='block';return;}
  const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const data=await res.json();
  if(res.ok&&data.require_otp){
    pendingUserId=data.user_id;
    document.getElementById('otpBox').style.display='block';
    document.getElementById('otpHint').textContent='🔐 OTP (demo): ' + data.otp;
  } else {
    errorBox.textContent=data.error||'Login failed.';errorBox.style.display='block';
  }
}
async function verifyOtp() {
  const otp=document.getElementById('otpInput').value.trim();
  const errorBox=document.getElementById('errorBox');
  const res=await fetch('/api/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:pendingUserId,otp})});
  const data=await res.json();
  if(res.ok){window.location.href='/dashboard';}
  else{errorBox.textContent=data.error||'Invalid OTP.';errorBox.style.display='block';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter') pendingUserId?verifyOtp():login();});
</script>
</body></html>
