services:
  - type: web
    name: phishnet-ai
    env: python
    buildCommand: pip install -r requirements.txt && python model/train_model.py
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: phishnet-db
          property: connectionString
databases:
  - name: phishnet-db
    plan: free
